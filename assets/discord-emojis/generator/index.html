<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helix Sequencing - Discord Emoji Generator</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #34D399; --green-light: #6EE7B7; --cyan: #06b6d4;
    --bg: #0c1520; --bg-card: #111e2e; --bg-elevated: #16263a;
    --border: rgba(52,211,153,0.14); --text: #dde6f0; --text-dim: #8B97A8;
  }
  body {
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .header {
    text-align: center; padding: 40px 20px 10px;
    background: linear-gradient(180deg, rgba(52,211,153,0.06) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px;
    background: linear-gradient(90deg, var(--green), var(--cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .header p { color: var(--text-dim); font-size: 13px; margin-top: 6px; }
  .controls {
    display: flex; justify-content: center; gap: 12px; padding: 20px;
    flex-wrap: wrap;
  }
  .btn {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500;
    padding: 8px 20px; border-radius: 6px; cursor: pointer; border: 1px solid;
    transition: all 0.2s; letter-spacing: 0.3px; text-transform: uppercase;
  }
  .btn-primary {
    background: rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.3);
    color: var(--green-light);
  }
  .btn-primary:hover {
    background: rgba(52,211,153,0.2); border-color: rgba(52,211,153,0.6);
    box-shadow: 0 0 20px rgba(52,211,153,0.15);
  }
  .btn-secondary {
    background: rgba(6,182,212,0.08); border-color: rgba(6,182,212,0.25);
    color: #67e8f9;
  }
  .btn-secondary:hover {
    background: rgba(6,182,212,0.16); border-color: rgba(6,182,212,0.5);
  }
  .section-title {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim);
    padding: 20px 40px 10px; border-top: 1px solid var(--border);
  }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px; padding: 16px 40px 40px;
  }
  .emoji-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px;
    transition: all 0.25s;
  }
  .emoji-card:hover {
    border-color: rgba(52,211,153,0.35); background: var(--bg-elevated);
    transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .emoji-card canvas { border-radius: 4px; }
  .emoji-name {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--text-dim); letter-spacing: 0.5px;
  }
  .emoji-dl {
    font-family: 'IBM Plex Mono', monospace; font-size: 9px;
    color: rgba(52,211,153,0.5); cursor: pointer; transition: color 0.2s;
    background: none; border: none; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .emoji-dl:hover { color: var(--green); }
  .size-toggle { display: flex; gap: 8px; align-items: center; }
  .size-toggle label { font-size: 11px; color: var(--text-dim); }
  .size-toggle select {
    background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
    padding: 4px 8px; border-radius: 4px; font-size: 11px; font-family: 'IBM Plex Mono', monospace;
  }
  .sticker-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px; padding: 16px 40px 40px;
  }
  .sticker-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px;
    transition: all 0.25s;
  }
  .sticker-card:hover {
    border-color: rgba(52,211,153,0.35); background: var(--bg-elevated);
    transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .sticker-card canvas { border-radius: 8px; }
  .sticker-name {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    color: var(--text-dim); letter-spacing: 0.5px;
  }
  .sticker-desc {
    font-size: 10px; color: rgba(139,151,168,0.6); text-align: center; max-width: 180px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ═══════════════════════════════════════════════════════════
//  HELIX BRAND PALETTE
// ═══════════════════════════════════════════════════════════
const P = {
  green:     '#34D399', greenLight: '#6EE7B7', greenDim: '#059669',
  cyan:      '#00E5FF', cyanMid:    '#06b6d4', cyanLight: '#38bdf8',
  pink:      '#FF4081', red:        '#f43f5e', redBright: '#ef4444',
  purple:    '#8b5cf6', purpleLight:'#a78bfa',
  blue:      '#3b82f6', blueLight:  '#60a5fa',
  orange:    '#f97316', orangeLight:'#fb923c',
  amber:     '#f59e0b', amberLight: '#fbbf24',
  gold:      '#FFD700',
  teal:      '#14b8a6', tealLight:  '#2dd4bf',
  bg:        '#0c1520', bgCard:     '#111e2e',
  white:     '#FFFFFF', textDim:    '#8B97A8',
};

// ═══════════════════════════════════════════════════════════
//  DRAWING PRIMITIVES
// ═══════════════════════════════════════════════════════════

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// Soft radial glow
function glow(ctx, x, y, r, color, alpha=0.5) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, hexToRgba(color, alpha));
  g.addColorStop(0.5, hexToRgba(color, alpha * 0.3));
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.fillRect(x - r, y - r, r * 2, r * 2);
}

// Glowing dot with white hot-center
function dot(ctx, x, y, r, color, opts = {}) {
  const { glowR = r * 4, glowAlpha = 0.4, highlight = true, alpha = 1 } = opts;
  ctx.save();
  ctx.globalAlpha = alpha;
  // outer glow
  glow(ctx, x, y, glowR, color, glowAlpha);
  // main dot
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
  // inner highlight
  if (highlight && r > 1.5) {
    ctx.beginPath(); ctx.arc(x, y, r * 0.45, 0, Math.PI * 2);
    ctx.fillStyle = P.white; ctx.globalAlpha = alpha * 0.7; ctx.fill();
  }
  ctx.restore();
}

// Stroke ring with glow
function ring(ctx, x, y, r, color, width = 2, opts = {}) {
  const { alpha = 0.8, dashArray = null, glowSize = 6 } = opts;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = color; ctx.shadowBlur = glowSize;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.strokeStyle = color; ctx.lineWidth = width;
  if (dashArray) ctx.setLineDash(dashArray);
  ctx.stroke();
  ctx.shadowBlur = 0; ctx.setLineDash([]);
  ctx.restore();
}

// Glowing line
function line(ctx, x1, y1, x2, y2, color, width = 2, opts = {}) {
  const { alpha = 0.8, cap = 'round', glowSize = 4 } = opts;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = color; ctx.shadowBlur = glowSize;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.strokeStyle = color; ctx.lineWidth = width; ctx.lineCap = cap;
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
}

// Arc segment
function arcSeg(ctx, x, y, r, startAngle, endAngle, color, width = 2, opts = {}) {
  const { alpha = 0.8, glowSize = 4 } = opts;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = color; ctx.shadowBlur = glowSize;
  ctx.beginPath(); ctx.arc(x, y, r, startAngle, endAngle);
  ctx.strokeStyle = color; ctx.lineWidth = width; ctx.lineCap = 'round';
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
}

// Shield path
function shieldPath(ctx, cx, cy, w, h) {
  ctx.beginPath();
  ctx.moveTo(cx, cy - h * 0.5);
  ctx.quadraticCurveTo(cx + w * 0.55, cy - h * 0.45, cx + w * 0.5, cy - h * 0.1);
  ctx.quadraticCurveTo(cx + w * 0.45, cy + h * 0.25, cx, cy + h * 0.5);
  ctx.quadraticCurveTo(cx - w * 0.45, cy + h * 0.25, cx - w * 0.5, cy - h * 0.1);
  ctx.quadraticCurveTo(cx - w * 0.55, cy - h * 0.45, cx, cy - h * 0.5);
  ctx.closePath();
}

// Heart path
function heartPath(ctx, cx, cy, size) {
  const s = size;
  ctx.beginPath();
  ctx.moveTo(cx, cy + s * 0.35);
  ctx.bezierCurveTo(cx - s * 0.55, cy + s * 0.05, cx - s * 0.55, cy - s * 0.35, cx - s * 0.25, cy - s * 0.35);
  ctx.bezierCurveTo(cx - s * 0.05, cy - s * 0.35, cx, cy - s * 0.15, cx, cy - s * 0.05);
  ctx.bezierCurveTo(cx, cy - s * 0.15, cx + s * 0.05, cy - s * 0.35, cx + s * 0.25, cy - s * 0.35);
  ctx.bezierCurveTo(cx + s * 0.55, cy - s * 0.35, cx + s * 0.55, cy + s * 0.05, cx, cy + s * 0.35);
  ctx.closePath();
}

// Diamond path
function diamondPath(ctx, cx, cy, w, h) {
  ctx.beginPath();
  ctx.moveTo(cx, cy - h/2);
  ctx.lineTo(cx + w/2, cy);
  ctx.lineTo(cx, cy + h/2);
  ctx.lineTo(cx - w/2, cy);
  ctx.closePath();
}

// Hexagon path
function hexPath(ctx, cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 3) * i - Math.PI / 6;
    const px = cx + r * Math.cos(a), py = cy + r * Math.sin(a);
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
}

// Capsule (rounded rect)
function capsule(ctx, cx, cy, w, h) {
  const r = h / 2;
  ctx.beginPath();
  ctx.moveTo(cx - w/2 + r, cy - h/2);
  ctx.lineTo(cx + w/2 - r, cy - h/2);
  ctx.arc(cx + w/2 - r, cy, r, -Math.PI/2, Math.PI/2);
  ctx.lineTo(cx - w/2 + r, cy + h/2);
  ctx.arc(cx - w/2 + r, cy, r, Math.PI/2, -Math.PI/2);
  ctx.closePath();
}

// Mini double helix watermark
function miniHelix(ctx, x, y, size, color = P.green) {
  const s = size;
  const pts = 6;
  ctx.save();
  ctx.globalAlpha = 0.3;
  for (let i = 0; i < pts; i++) {
    const pct = i / (pts - 1);
    const py = y - s/2 + pct * s;
    const phase = pct * Math.PI * 2 * 1.5;
    const px1 = x + Math.sin(phase) * s * 0.25;
    const px2 = x + Math.sin(phase + Math.PI) * s * 0.25;
    const r = 0.8;
    ctx.beginPath(); ctx.arc(px1, py, r, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
    ctx.beginPath(); ctx.arc(px2, py, r * 0.6, 0, Math.PI*2);
    ctx.fillStyle = hexToRgba(color, 0.5); ctx.fill();
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  AGENT FRAME (shared dark circle container)
// ═══════════════════════════════════════════════════════════

function drawAgentFrame(ctx, s, color) {
  const cx = s/2, cy = s/2, r = s * 0.44;

  // Background circle with radial gradient
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  bg.addColorStop(0, '#1a2a3e');
  bg.addColorStop(0.6, '#101d2e');
  bg.addColorStop(1, '#0a1420');
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = bg; ctx.fill();

  // Outer glow ring
  ring(ctx, cx, cy, r, color, 2.5, { alpha: 0.7, glowSize: 10 });
  // Subtle inner ring
  ring(ctx, cx, cy, r - 4, color, 0.5, { alpha: 0.15, glowSize: 0 });

  // Ambient glow at top
  glow(ctx, cx, cy - r * 0.3, r * 0.6, color, 0.08);
}

// ═══════════════════════════════════════════════════════════
//  AGENT EMOJI DEFINITIONS
// ═══════════════════════════════════════════════════════════

const AGENT_EMOJIS = [
  {
    name: 'agent_scanner', label: 'Scanner', color: P.cyan,
    draw(ctx, s) {
      const cx = s/2, cy = s/2;
      // Radar arcs
      arcSeg(ctx, cx, cy, 18, -0.3, 1.2, P.cyan, 2, { alpha: 0.6 });
      arcSeg(ctx, cx, cy, 13, 0.5, 2.0, P.cyanLight, 1.5, { alpha: 0.5 });
      arcSeg(ctx, cx, cy, 23, -1.0, 0.2, P.cyan, 1.5, { alpha: 0.4 });
      // Sweep line
      line(ctx, cx, cy, cx + 22, cy - 10, P.cyan, 1.5, { alpha: 0.7, glowSize: 6 });
      // Data dots
      dot(ctx, cx + 14, cy - 6, 2, P.cyanLight, { glowR: 6, glowAlpha: 0.5 });
      dot(ctx, cx - 8, cy - 14, 1.5, P.cyan, { glowR: 5 });
      dot(ctx, cx + 5, cy + 15, 1.5, P.cyanLight, { glowR: 5 });
      dot(ctx, cx - 16, cy + 4, 1.2, P.cyan, { glowR: 4, glowAlpha: 0.3 });
      // Center dot
      dot(ctx, cx, cy, 2.5, P.white, { glowR: 8, glowAlpha: 0.3 });
    }
  },
  {
    name: 'agent_coordinator', label: 'Coordinator', color: P.gold,
    draw(ctx, s) {
      const cx = s/2, cy = s/2;
      const nodes = 5, r = 18;
      // Connection lines
      for (let i = 0; i < nodes; i++) {
        const a = (Math.PI * 2 / nodes) * i - Math.PI/2;
        const nx = cx + Math.cos(a) * r, ny = cy + Math.sin(a) * r;
        line(ctx, cx, cy, nx, ny, P.gold, 1.2, { alpha: 0.5, glowSize: 3 });
        // Cross-connections
        const a2 = (Math.PI * 2 / nodes) * ((i + 2) % nodes) - Math.PI/2;
        const nx2 = cx + Math.cos(a2) * r, ny2 = cy + Math.sin(a2) * r;
        line(ctx, nx, ny, nx2, ny2, P.gold, 0.5, { alpha: 0.2, glowSize: 2 });
      }
      // Satellite nodes
      for (let i = 0; i < nodes; i++) {
        const a = (Math.PI * 2 / nodes) * i - Math.PI/2;
        const nx = cx + Math.cos(a) * r, ny = cy + Math.sin(a) * r;
        dot(ctx, nx, ny, 2.5, P.amberLight, { glowR: 7 });
      }
      // Hub
      dot(ctx, cx, cy, 4, P.gold, { glowR: 12, glowAlpha: 0.5 });
    }
  },
  {
    name: 'agent_collector', label: 'Collector', color: P.cyan,
    draw(ctx, s) {
      const cx = s/2, cy = s/2;
      // Funnel/vortex - spiraling dots converging
      const pts = 12;
      for (let i = 0; i < pts; i++) {
        const t = i / pts;
        const angle = t * Math.PI * 3 + 0.5;
        const dist = 22 - t * 16;
        const px = cx + Math.cos(angle) * dist;
        const py = cy - 10 + t * 20;
        const sz = 1.2 + (1 - t) * 1.2;
        dot(ctx, px, py, sz, P.cyanLight, { glowR: sz * 3, glowAlpha: 0.3 + t * 0.3 });
        if (i > 0) {
          const pt = (i-1) / pts;
          const pa = pt * Math.PI * 3 + 0.5;
          const pd = 22 - pt * 16;
          const ppx = cx + Math.cos(pa) * pd;
          const ppy = cy - 10 + pt * 20;
          line(ctx, ppx, ppy, px, py, P.cyan, 0.6, { alpha: 0.2 });
        }
      }
      // Collection point at bottom
      glow(ctx, cx, cy + 8, 8, P.cyan, 0.5);
      dot(ctx, cx, cy + 8, 3, P.white, { glowR: 10, glowAlpha: 0.4 });
    }
  },
  {
    name: 'agent_reporter', label: 'Reporter', color: P.greenLight,
    draw(ctx, s) {
      const cx = s/2, cy = s/2;
      // Document outline
      const dw = 22, dh = 28;
      ctx.save();
      ctx.shadowColor = P.green; ctx.shadowBlur = 6;
      ctx.strokeStyle = P.greenLight; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.moveTo(cx - dw/2, cy - dh/2);
      ctx.lineTo(cx + dw/2 - 6, cy - dh/2);
      ctx.lineTo(cx + dw/2, cy - dh/2 + 6);
      ctx.lineTo(cx + dw/2, cy + dh/2);
      ctx.lineTo(cx - dw/2, cy + dh/2);
      ctx.closePath();
      ctx.stroke();
      // Corner fold
      ctx.beginPath();
      ctx.moveTo(cx + dw/2 - 6, cy - dh/2);
      ctx.lineTo(cx + dw/2 - 6, cy - dh/2 + 6);
      ctx.lineTo(cx + dw/2, cy - dh/2 + 6);
      ctx.stroke();
      ctx.restore();
      // Data lines (bar chart)
      const bars = [12, 18, 10, 20, 14];
      bars.forEach((h, i) => {
        const bx = cx - 7 + i * 4;
        const by = cy + 10 - h * 0.4;
        const bh = h * 0.4;
        ctx.save();
        ctx.fillStyle = i % 2 === 0 ? P.green : P.cyan;
        ctx.globalAlpha = 0.5 + (h / 20) * 0.3;
        ctx.shadowColor = i % 2 === 0 ? P.green : P.cyan;
        ctx.shadowBlur = 3;
        ctx.fillRect(bx, by, 2.5, bh);
        ctx.restore();
      });
      // Helix accent
      dot(ctx, cx + 6, cy - 8, 1, P.cyan, { glowR: 3, glowAlpha: 0.3 });
    }
  },
  {
    name: 'agent_synthesizer', label: 'Synthesizer', color: P.purple,
    draw(ctx, s) {
      const cx = s/2, cy = s/2;
      // Two streams merging (Y-junction)
      // Left stream
      const pts = 6;
      for (let i = 0; i < pts; i++) {
        const t = i / (pts - 1);
        const px = cx - 14 + t * 14, py = cy - 14 + t * 14;
        dot(ctx, px, py, 1.5 - t * 0.3, P.purpleLight, { glowR: 4 });
        if (i > 0) line(ctx, cx - 14 + (t - 1/(pts-1)) * 14, cy - 14 + (t - 1/(pts-1)) * 14, px, py, P.purple, 1, { alpha: 0.4 });
      }
      // Right stream
      for (let i = 0; i < pts; i++) {
        const t = i / (pts - 1);
        const px = cx + 14 - t * 14, py = cy - 14 + t * 14;
        dot(ctx, px, py, 1.5 - t * 0.3, P.cyanLight, { glowR: 4 });
        if (i > 0) line(ctx, cx + 14 - (t - 1/(pts-1)) * 14, cy - 14 + (t - 1/(pts-1)) * 14, px, py, P.cyanMid, 1, { alpha: 0.4 });
      }
      // Merge point
      glow(ctx, cx, cy, 10, P.purple, 0.4);
      dot(ctx, cx, cy, 3, P.white, { glowR: 10, glowAlpha: 0.5 });
      // Output stream
      for (let i = 1; i <= 5; i++) {
        const t = i / 5;
        const py = cy + t * 16;
        dot(ctx, cx, py, 2 - t * 0.5, P.green, { glowR: 5 });
        if (i > 0) line(ctx, cx, py - 16/5, cx, py, P.green, 1.2, { alpha: 0.5 });
      }
    }
  },
  {
    name: 'agent_cancer', label: 'Cancer', color: P.red,
    draw(ctx, s) {
      const cx = s/2, cy = s/2;
      // Irregular cell blob
      ctx.save();
      ctx.shadowColor = P.red; ctx.shadowBlur = 8;
      ctx.beginPath();
      const pts = 12;
      for (let i = 0; i <= pts; i++) {
        const a = (Math.PI * 2 / pts) * i;
        const wobble = 12 + Math.sin(a * 3) * 4 + Math.cos(a * 5) * 2;
        const px = cx + Math.cos(a) * wobble, py = cy + Math.sin(a) * wobble;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle = hexToRgba(P.red, 0.15); ctx.fill();
      ctx.strokeStyle = P.red; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.6; ctx.stroke();
      ctx.restore();
      // Crosshair
      line(ctx, cx - 20, cy, cx + 20, cy, P.pink, 0.8, { alpha: 0.4 });
      line(ctx, cx, cy - 20, cx, cy + 20, P.pink, 0.8, { alpha: 0.4 });
      // Target ring
      ring(ctx, cx, cy, 8, P.pink, 0.8, { alpha: 0.3, glowSize: 0 });
      // Mutation dots
      dot(ctx, cx + 5, cy - 4, 1.5, P.pink, { glowR: 4 });
      dot(ctx, cx - 3, cy + 6, 1.2, P.red, { glowR: 3 });
    }
  },
  {
    name: 'agent_cardio', label: 'Cardio', color: P.redBright,
    draw(ctx, s) {
      const cx = s/2, cy = s/2 - 2;
      // Heart outline
      ctx.save();
      ctx.shadowColor = P.redBright; ctx.shadowBlur = 8;
      heartPath(ctx, cx, cy, 28);

// ═══════════════════════════════════════════════════════════
//  FULL HELIX DRAWING (adapted from HelixLogo.tsx)
// ═══════════════════════════════════════════════════════════

function drawHelixFull(ctx, cx, cy, height, amplitude, opts = {}) {
  const {
    twists = 2.5, numPoints = 18,
    mainColor = P.green, mainColorLight = P.greenLight,
    ghostColor = P.greenLight,
    accentCyan = P.cyan, accentPink = P.pink,
  } = opts;

  const pts1 = [], pts2 = [];
  for (let i = 0; i < numPoints; i++) {
    const pct = i / (numPoints - 1);
    const y = cy - height/2 + pct * height;
    const phase = pct * Math.PI * 2 * twists;
    pts1.push({ x: cx + Math.sin(phase) * amplitude, y, z: Math.cos(phase) });
    pts2.push({ x: cx + Math.sin(phase + Math.PI) * amplitude, y, z: Math.cos(phase + Math.PI) });
  }

  // Base pair rungs
  for (let i = 0; i < numPoints; i += 2) {
    const p1 = pts1[i], p2 = pts2[i];
    const d = 0.15 + (Math.max(p1.z, p2.z) + 1) * 0.25;
    const isAT = i % 4 === 0;
    const col = isAT ? accentCyan : accentPink;
    const dotR = Math.max(2, height * 0.012);
    ctx.save();
    ctx.setLineDash([height * 0.008, height * 0.006]);
    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
    ctx.strokeStyle = col; ctx.globalAlpha = d * 0.35;
    ctx.lineWidth = Math.max(0.5, height * 0.005); ctx.stroke();
    ctx.setLineDash([]);
    ctx.shadowColor = col; ctx.shadowBlur = height * 0.015;
    ctx.beginPath(); ctx.arc(p1.x, p1.y, dotR, 0, Math.PI * 2);
    ctx.fillStyle = col; ctx.globalAlpha = d * 0.7; ctx.fill();
    ctx.beginPath(); ctx.arc(p2.x, p2.y, dotR * 0.7, 0, Math.PI * 2);
    ctx.globalAlpha = d * 0.4; ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Ghost strand
  for (let i = 0; i < pts2.length - 1; i++) {
    const p = pts2[i], pn = pts2[i + 1];
    const d = 0.3 + (p.z + 1) * 0.35;
    ctx.save();
    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(pn.x, pn.y);
    ctx.strokeStyle = ghostColor;
    ctx.globalAlpha = d * 0.2; ctx.lineWidth = Math.max(0.5, height * 0.007);
    ctx.lineCap = 'round'; ctx.stroke();
    ctx.restore();
  }
  for (const p of pts2) {
    const d = 0.3 + (p.z + 1) * 0.35;
    const r = Math.max(1, height * 0.008) * (0.6 + d * 0.4);
    ctx.save();
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = ghostColor;
    ctx.globalAlpha = 0.2 + d * 0.25; ctx.fill();
    ctx.restore();
  }

  // Bold strand (glow + core)
  for (let i = 0; i < pts1.length - 1; i++) {
    const p = pts1[i], pn = pts1[i + 1];
    const d = 0.3 + (p.z + 1) * 0.35;
    ctx.save(); ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(pn.x, pn.y);
    ctx.strokeStyle = mainColor;
    ctx.globalAlpha = d * 0.15; ctx.lineWidth = Math.max(4, height * 0.035); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(pn.x, pn.y);
    ctx.globalAlpha = d * 0.65; ctx.lineWidth = Math.max(2, height * 0.018); ctx.stroke();
    ctx.restore();
  }

  // Bold strand particles (z-sorted for depth)
  const sorted = [...pts1].sort((a, b) => a.z - b.z);
  for (const p of sorted) {
    const d = 0.3 + (p.z + 1) * 0.35;
    const r = Math.max(3, height * 0.028) * (0.55 + d * 0.45);
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 4.5);
    g.addColorStop(0, hexToRgba(mainColor, d * 0.35));
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(p.x - r * 5, p.y - r * 5, r * 10, r * 10);
    ctx.save();
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = mainColor; ctx.globalAlpha = 0.5 + d * 0.5; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x, p.y, r * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = mainColorLight; ctx.globalAlpha = d * 0.4; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x, p.y, r * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#FFFFFF'; ctx.globalAlpha = d * 0.6; ctx.fill();
    ctx.restore();
  }
}

// Sticker text helper
function stickerText(ctx, text, cx, cy, opts = {}) {
  const { size = 32, color = P.green, colorEnd = null, weight = 800, glow = true, alpha = 0.9 } = opts;
  ctx.save();
  ctx.font = `${weight} ${size}px Syne, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (glow) { ctx.shadowColor = color; ctx.shadowBlur = 12; }
  if (colorEnd) {
    const grad = ctx.createLinearGradient(cx - size * 2, cy, cx + size * 2, cy);
    grad.addColorStop(0, color); grad.addColorStop(1, colorEnd);
    ctx.fillStyle = grad;
  } else {
    ctx.fillStyle = color;
  }
  ctx.globalAlpha = alpha;
  ctx.fillText(text, cx, cy);
  ctx.restore();
}

function stickerSubtext(ctx, text, cx, cy, opts = {}) {
  const { size = 13, color = P.textDim, tracking = 3 } = opts;
  ctx.save();
  ctx.font = `500 ${size}px "IBM Plex Mono", monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.letterSpacing = tracking + 'px';
  ctx.fillStyle = color; ctx.globalAlpha = 0.6;
  ctx.fillText(text, cx, cy);
  ctx.restore();
}

      ctx.restore();
      // Lens glare
      arcSeg(ctx, mx, my, mr - 4, -Math.PI * 0.8, -Math.PI * 0.3, P.white, 1.5, { alpha: 0.15, glowSize: 0 });
      // Handle
      ctx.save();
      ctx.shadowColor = P.cyan; ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(mx + mr * 0.65, my + mr * 0.65);
      ctx.lineTo(mx + mr * 1.15, my + mr * 1.15);
      ctx.strokeStyle = P.cyanMid; ctx.lineWidth = 7; ctx.lineCap = 'round';
      ctx.globalAlpha = 0.6; ctx.stroke();
      // Handle highlight
      ctx.lineWidth = 3; ctx.strokeStyle = P.cyanLight; ctx.globalAlpha = 0.3; ctx.stroke();
      ctx.restore();

      // DNA inside lens (mini helix, brightly glowing)
      drawHelixFull(ctx, mx, my, 70, 22, {
        twists: 1.5, numPoints: 10,
        mainColor: P.green, mainColorLight: P.greenLight,
      });

      // Sparkle/star bursts around the lens
      const stars = [
        [cx + 52, cy - 70, 8], [cx - 60, cy - 65, 6], [cx + 60, cy - 10, 7],
        [cx - 55, cy + 10, 5], [cx + 40, cy - 90, 5], [cx - 70, cy - 25, 4],
      ];
      stars.forEach(([sx, sy, sr]) => {
        // 4-point star
        ctx.save();
        ctx.strokeStyle = P.amberLight; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
        ctx.globalAlpha = 0.6; ctx.shadowColor = P.amberLight; ctx.shadowBlur = 4;
        ctx.beginPath(); ctx.moveTo(sx, sy - sr); ctx.lineTo(sx, sy + sr); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(sx - sr, sy); ctx.lineTo(sx + sr, sy); ctx.stroke();
        // Diagonal (smaller)
        ctx.lineWidth = 0.8; ctx.globalAlpha = 0.3;
        ctx.beginPath(); ctx.moveTo(sx - sr*0.5, sy - sr*0.5); ctx.lineTo(sx + sr*0.5, sy + sr*0.5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(sx + sr*0.5, sy - sr*0.5); ctx.lineTo(sx - sr*0.5, sy + sr*0.5); ctx.stroke();
        ctx.restore();
        dot(ctx, sx, sy, 1, P.amberLight, { glowR: sr, glowAlpha: 0.4 });
      });

      // "Nice Find!" text
      stickerText(ctx, 'Nice Find!', cx, cy + 110, {
        size: 36, color: P.cyan, colorEnd: P.green,
      });
      stickerSubtext(ctx, '#SHOW-YOUR-RESULTS', cx, cy + 138, { color: P.cyanMid });
    }
  },
  {
    name: 'sticker_rare_discovery', label: 'Rare Discovery', desc: '#rare-diseases channel',
    draw(ctx, s) {
      const cx = s/2, cy = s/2;

      // Premium purple/gold ambience
      glow(ctx, cx, cy - 20, 100, P.purple, 0.1);
      glow(ctx, cx, cy - 20, 60, P.gold, 0.05);

      // Large diamond/gem
      const dx = cx, dy = cy - 15;
      const dw = 100, dh = 120;

      // Outer diamond shape
      ctx.save();
      ctx.shadowColor = P.purple; ctx.shadowBlur = 20;
      diamondPath(ctx, dx, dy, dw, dh);
      ctx.fillStyle = hexToRgba(P.purple, 0.1); ctx.fill();
      ctx.strokeStyle = P.purpleLight; ctx.lineWidth = 2.5; ctx.globalAlpha = 0.7;
      ctx.stroke();
      ctx.restore();

      // Facet lines
      ctx.save();
      ctx.strokeStyle = P.purpleLight; ctx.lineWidth = 1; ctx.globalAlpha = 0.15;
      // Top facets
      ctx.beginPath(); ctx.moveTo(dx - dw/2, dy); ctx.lineTo(dx, dy - dh * 0.25); ctx.lineTo(dx + dw/2, dy); ctx.stroke();
      // Bottom facets
      ctx.beginPath(); ctx.moveTo(dx - dw * 0.3, dy); ctx.lineTo(dx, dy + dh/2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(dx + dw * 0.3, dy); ctx.lineTo(dx, dy + dh/2); ctx.stroke();
      // Cross facets
      ctx.beginPath(); ctx.moveTo(dx - dw * 0.35, dy - dh * 0.15); ctx.lineTo(dx + dw * 0.35, dy - dh * 0.15); ctx.stroke();
      ctx.restore();

      // Inner glow
      glow(ctx, dx, dy - 5, 35, P.purpleLight, 0.35);
      glow(ctx, dx, dy - 10, 18, P.white, 0.2);

      // Mini helix inside the gem
      ctx.save();
      // Clip to diamond
      diamondPath(ctx, dx, dy, dw - 10, dh - 10);
      ctx.clip();
      drawHelixFull(ctx, dx, dy, 80, 18, {
        twists: 1.8, numPoints: 12,
        mainColor: P.purpleLight, mainColorLight: '#c4b5fd',
        ghostColor: '#c4b5fd', accentCyan: P.gold, accentPink: P.pink,
      });
      ctx.restore();

      // Crown / star decoration above
      const crownY = dy - dh/2 - 18;
      // Three star points
      [[-20, crownY + 5], [0, crownY - 8], [20, crownY + 5]].forEach(([ox, oy], i) => {
        const px = dx + ox;
        dot(ctx, px, oy, 2, P.gold, { glowR: 8, glowAlpha: 0.5 });
        if (i < 2) line(ctx, px, oy, dx + [0, 20][i], [crownY - 8, crownY + 5][i], P.gold, 1, { alpha: 0.3 });
      });
      // Connecting crown line
      line(ctx, dx - 20, crownY + 5, dx + 20, crownY + 5, P.gold, 1, { alpha: 0.25 });

      // Sparkle effects around gem
      [[dx-55, dy-30, 6], [dx+58, dy-25, 5], [dx-45, dy+35, 4], [dx+50, dy+30, 5]].forEach(([sx,sy,sr]) => {
        ctx.save();
        ctx.strokeStyle = P.gold; ctx.lineWidth = 1; ctx.lineCap = 'round';
        ctx.globalAlpha = 0.4; ctx.shadowColor = P.gold; ctx.shadowBlur = 3;
        ctx.beginPath(); ctx.moveTo(sx, sy-sr); ctx.lineTo(sx, sy+sr); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(sx-sr, sy); ctx.lineTo(sx+sr, sy); ctx.stroke();
        ctx.restore();
      });

      // "Rare Discovery" text
      stickerText(ctx, 'Rare Discovery', cx, cy + 115, {
        size: 30, color: P.purpleLight, colorEnd: P.gold,
      });
      stickerSubtext(ctx, '#RARE-DISEASES', cx, cy + 142, { color: P.purpleLight });
    }
  },
  {
    name: 'sticker_pipeline_running', label: 'Pipeline Running', desc: 'Analysis in progress',
    draw(ctx, s) {
      const cx = s/2, cy = s/2;

      // Tech ambience
      glow(ctx, cx, cy - 30, 100, P.green, 0.06);
      glow(ctx, cx, cy - 30, 60, P.cyanMid, 0.04);

      // Horizontal double helix spanning width
      ctx.save();
      ctx.translate(cx, cy - 30);
      ctx.rotate(-Math.PI / 2);
      drawHelixFull(ctx, 0, 0, 220, 35, {
        twists: 3, numPoints: 24,
        mainColor: P.green, mainColorLight: P.greenLight,
      });
      ctx.restore();

      // Data particles flowing along the helix (bright accents)
      const flowPts = [
        [cx - 80, cy - 40], [cx - 45, cy - 15], [cx - 10, cy - 45],
        [cx + 25, cy - 20], [cx + 60, cy - 40], [cx + 90, cy - 25],
      ];
      flowPts.forEach(([fx, fy], i) => {
        const t = i / flowPts.length;
        const pulseR = 2 + Math.sin(t * Math.PI) * 1.5;
        dot(ctx, fx, fy, pulseR, P.cyan, { glowR: 10, glowAlpha: 0.5 });
      });

      // Progress bar
      const barW = 160, barH = 4, barY = cy + 60;
      // Track
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(cx - barW/2, barY, barW, barH, 2);
      ctx.fillStyle = hexToRgba(P.green, 0.12); ctx.fill();
      // Fill (animated position - show at 65%)
      const fillW = barW * 0.65;
      const grad = ctx.createLinearGradient(cx - barW/2, 0, cx - barW/2 + fillW, 0);
      grad.addColorStop(0, hexToRgba(P.green, 0.6));
      grad.addColorStop(1, hexToRgba(P.cyan, 0.8));
      ctx.beginPath();
      ctx.roundRect(cx - barW/2, barY, fillW, barH, 2);
      ctx.fillStyle = grad; ctx.fill();
      ctx.shadowColor = P.green; ctx.shadowBlur = 6;
      ctx.fill();
      ctx.restore();
      // Progress dot at tip
      dot(ctx, cx - barW/2 + fillW, barY + 2, 3, P.cyanLight, { glowR: 8, glowAlpha: 0.5 });

      // Loading dots animation (static: show 3 dots at different opacities)
      const dotY = cy + 82;
      [0.4, 0.7, 1.0].forEach((a, i) => {
        dot(ctx, cx - 8 + i * 8, dotY, 2, P.greenLight, { glowR: 4, glowAlpha: a * 0.3, alpha: a });
      });

      // "Pipeline Running" text
      stickerText(ctx, 'Pipeline Running', cx, cy + 110, {
        size: 28, color: P.green, colorEnd: P.cyan,
      });
      stickerSubtext(ctx, 'ANALYSIS IN PROGRESS', cx, cy + 136, { color: P.greenLight });
    }
  },
];

//  REACT APP
// ═══════════════════════════════════════════════════════════

function EmojiCard({ emoji, isAgent, displaySize }) {
  const canvasRef = React.useRef(null);
  const renderSize = 128;

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = 2;
    canvas.width = renderSize * dpr;
    canvas.height = renderSize * dpr;
    canvas.style.width = displaySize + 'px';
    canvas.style.height = displaySize + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, renderSize, renderSize);

    if (isAgent) {
      drawAgentFrame(ctx, renderSize, emoji.color);
    }
    emoji.draw(ctx, renderSize);
    if (isAgent) {
      miniHelix(ctx, renderSize * 0.82, renderSize * 0.8, 14, emoji.color);
    }
  }, [emoji, isAgent, displaySize]);

  const download = () => {
    const canvas = canvasRef.current;
    const link = document.createElement('a');
    link.download = emoji.name + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  };

  return (
    <div className="emoji-card">
      <canvas ref={canvasRef} />
      <span className="emoji-name">{emoji.name}</span>
      <button className="emoji-dl" onClick={download}>download</button>
    </div>
  );
}

function StickerCard({ sticker }) {
  const canvasRef = React.useRef(null);
  const renderSize = 320;
  const displaySize = 200;

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = 2;
    canvas.width = renderSize * dpr;
    canvas.height = renderSize * dpr;
    canvas.style.width = displaySize + 'px';
    canvas.style.height = displaySize + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, renderSize, renderSize);
    sticker.draw(ctx, renderSize);
  }, [sticker]);

  const download = () => {
    const canvas = canvasRef.current;
    const link = document.createElement('a');
    link.download = sticker.name + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  };

  return (
    <div className="sticker-card">
      <canvas ref={canvasRef} />
      <span className="sticker-name">{sticker.label}</span>
      <span className="sticker-desc">{sticker.desc}</span>
      <button className="emoji-dl" onClick={download}>download 320x320 png</button>
    </div>
  );
}

function App() {
  const [displaySize, setDisplaySize] = React.useState(96);

  const downloadAllEmojis = () => {
    const allEmojis = [...AGENT_EMOJIS, ...STATUS_EMOJIS];
    allEmojis.forEach((emoji, i) => {
      setTimeout(() => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const dpr = 2;
        canvas.width = 128 * dpr;
        canvas.height = 128 * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        const isAgent = AGENT_EMOJIS.includes(emoji);
        if (isAgent) drawAgentFrame(ctx, 128, emoji.color);
        emoji.draw(ctx, 128);
        if (isAgent) miniHelix(ctx, 128 * 0.82, 128 * 0.8, 14, emoji.color);
        const link = document.createElement('a');
        link.download = emoji.name + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      }, i * 150);
    });
  };

  const downloadAllStickers = () => {
    STICKER_DESIGNS.forEach((sticker, i) => {
      setTimeout(() => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const dpr = 2;
        canvas.width = 320 * dpr;
        canvas.height = 320 * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        sticker.draw(ctx, 320);
        const link = document.createElement('a');
        link.download = sticker.name + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      }, i * 200);
    });
  };

  const total = AGENT_EMOJIS.length + STATUS_EMOJIS.length + STICKER_DESIGNS.length;

  return (
    <div>
      <div className="header">
        <h1>Helix Sequencing</h1>
        <p>Discord Assets &mdash; {AGENT_EMOJIS.length + STATUS_EMOJIS.length} emojis + {STICKER_DESIGNS.length} stickers</p>
      </div>

      <div className="controls">
        <button className="btn btn-primary" onClick={downloadAllEmojis}>
          Download All Emojis
        </button>
        <button className="btn btn-secondary" onClick={downloadAllStickers}>
          Download All Stickers
        </button>
        <div className="size-toggle">
          <label>Emoji Preview:</label>
          <select value={displaySize} onChange={e => setDisplaySize(Number(e.target.value))}>
            <option value={48}>48px (Discord text)</option>
            <option value={64}>64px</option>
            <option value={96}>96px (Preview)</option>
            <option value={128}>128px (Full)</option>
          </select>
        </div>
      </div>

      <div className="section-title">Agent Emojis ({AGENT_EMOJIS.length})</div>
      <div className="grid">
        {AGENT_EMOJIS.map(e => <EmojiCard key={e.name} emoji={e} isAgent={true} displaySize={displaySize} />)}
      </div>

      <div className="section-title">Status &amp; Category Emojis ({STATUS_EMOJIS.length})</div>
      <div className="grid">
        {STATUS_EMOJIS.map(e => <EmojiCard key={e.name} emoji={e} isAgent={false} displaySize={displaySize} />)}
      </div>

      <div className="section-title">Discord Stickers ({STICKER_DESIGNS.length}) &mdash; 320&times;320 PNG</div>
      <div className="sticker-grid">
        {STICKER_DESIGNS.map(s => <StickerCard key={s.name} sticker={s} />)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
